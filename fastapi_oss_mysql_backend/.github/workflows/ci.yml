name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.0"

jobs:
  # ============================================
  # 1. 代码质量检查（ruff + mypy）
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
            version: ${{ env.UV_VERSION }}

      - name: 设置 Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: 安装依赖
        run: uv sync --extra dev

      - name: Ruff 检查
        run: uv run ruff check src tests

      - name: Ruff 格式检查
        run: uv run ruff format --check src tests

      - name: MyPy 类型检查
        run: uv run mypy src

  # ============================================
  # 2. 单元测试 + 集成测试
  # ============================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ptest_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 设置 Python
        run: uv python install ${{ matrix.python-version }}

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-test-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-test-

      - name: 安装依赖
        run: uv sync --extra dev

      - name: 运行测试
        env:
          APP_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_root
          DB_NAME: test_db
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SECRET_KEY: test-secret-key-for-ci-only-32bytes
        run: |
          uv run pytest -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: 上传覆盖率
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ============================================
  # 3. 安全扫描
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Trivy 漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          ignore-unfixed: true

      - name: 检测密钥泄露
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ============================================
  # 4. Docker 镜像构建（仅 main 分支）
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建镜像（不推送）
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: fastapi-oss-mysql-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
